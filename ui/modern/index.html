<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShanshuiAgent | 山水智研</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260601-1605" />
  </head>
  <body>
    <canvas id="ink-field" aria-hidden="true"></canvas>
    <section id="intro-screen" class="intro-screen" aria-label="进入工作台">
      <div class="intro-lines" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="intro-content">
        <p>ShanshuiAgent</p>
        <h1>山水智研</h1>
        <button id="enter-app" type="button">进入工作台</button>
      </div>
    </section>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 44 44" focusable="false">
              <path class="mark-sun" d="M31 12.5a3.8 3.8 0 1 0 0 7.6 3.8 3.8 0 0 0 0-7.6Z" />
              <path class="mark-ridge" d="M7.5 30.5 16.4 19l6.5 7.8 4.7-5.2 8.9 8.9" />
              <path class="mark-water" d="M9 34c4.3-1.6 7.6-1.6 11.8 0 4.4 1.6 8 1.6 14.2-.2" />
            </svg>
          </span>
          <div>
            <strong>山水智研</strong>
            <span>ShanshuiAgent</span>
          </div>
        </div>
        <nav class="nav" aria-label="主导航">
          <button class="nav-item active" data-view="chat">对话</button>
          <button class="nav-item" data-view="evidence">证据</button>
          <button class="nav-item" data-view="corpus">语料</button>
          <button class="nav-item" data-view="system">系统</button>
        </nav>
        <div class="status-strip">
          <span id="health-dot" class="dot pending"></span>
          <span id="health-text">检查中</span>
        </div>
      </aside>

      <main class="workspace">
        <section id="view-chat" class="view active">
          <header class="topbar">
            <div>
              <h1>山水智研</h1>
              <p id="runtime-line">Evidence-grounded research and creation agent</p>
            </div>
            <div class="topbar-actions">
              <button id="toggle-evidence" class="ghost-button" type="button" aria-expanded="true">隐藏证据</button>
              <button id="clear-chat" class="ghost-button" type="button">清空</button>
            </div>
          </header>

          <div class="chat-layout">
            <section class="conversation" aria-label="对话记录">
              <div id="answer-status" class="answer-status" hidden></div>
              <div id="agent-trace" class="agent-trace" hidden></div>
              <div id="messages" class="messages"></div>
              <div id="example-prompts" class="example-prompts" aria-label="示例问题">
                <div class="prompt-group">
                  <span>技法</span>
                  <button type="button" data-prompt="青绿山水是什么？">青绿山水</button>
                  <button type="button" data-prompt="皴法在山水画中有什么作用？">皴法</button>
                  <button type="button" data-prompt="宋代山水画的三远法是什么？">三远法</button>
                </div>
                <div class="prompt-group">
                  <span>朝代</span>
                  <button type="button" data-prompt="宋元山水画有什么变化？">宋元变化</button>
                  <button type="button" data-prompt="明清山水画有什么区别？">明清区别</button>
                </div>
                <div class="prompt-group">
                  <span>画家</span>
                  <button type="button" data-prompt="董其昌南北宗论如何影响山水画？">董其昌</button>
                  <button type="button" data-prompt="石涛《苦瓜和尚画语录》的山水画观念是什么？">石涛</button>
                </div>
                <div class="prompt-group">
                  <span>作品</span>
                  <button type="button" data-prompt="《富春山居图》是谁画的？">富春山居图</button>
                  <button type="button" data-prompt="《千里江山图》属于什么类型的山水画？">千里江山图</button>
                </div>
                <div class="prompt-group">
                  <span>创作</span>
                  <button type="button" data-prompt="请根据明代吴门画派风格生成一幅江南山水长卷">吴门长卷</button>
                  <button type="button" data-prompt="请参考青绿山水设色方式生成一幅山水画">青绿创作</button>
                </div>
              </div>
              <form id="chat-form" class="composer">
                <textarea id="chat-input" rows="2" placeholder="输入你的问题"></textarea>
                <button id="send-button" type="submit">发送</button>
              </form>
            </section>
            <aside class="evidence-rail">
              <div class="rail-title">
                <span>当前证据</span>
                <small id="evidence-count">0</small>
              </div>
              <div id="evidence-list" class="evidence-list"></div>
            </aside>
          </div>
        </section>

        <section id="view-evidence" class="view">
          <header class="topbar">
            <div>
              <h1>证据检索</h1>
              <p>Milvus + evidence store</p>
            </div>
          </header>
          <form id="retrieve-form" class="search-row">
            <input id="retrieve-input" type="search" placeholder="检索画家、流派、技法或文献主题" />
            <button type="submit">检索</button>
          </form>
          <div id="retrieve-results" class="result-grid"></div>
        </section>

        <section id="view-corpus" class="view">
          <header class="topbar">
            <div>
              <h1>语料库</h1>
              <p id="corpus-summary">加载中</p>
            </div>
            <button id="refresh-corpus" class="ghost-button" type="button">刷新</button>
          </header>
          <div class="corpus-note">
            <span>A / A-：优先引用</span>
            <span>B+ / B：辅助核验</span>
            <span>C：背景参考</span>
          </div>
          <div class="corpus-filters" aria-label="语料筛选">
            <select id="filter-dynasty">
              <option value="">全部朝代</option>
            </select>
            <select id="filter-school">
              <option value="">全部流派</option>
            </select>
            <select id="filter-technique">
              <option value="">全部技法</option>
            </select>
            <select id="filter-authority">
              <option value="">全部等级</option>
            </select>
          </div>
          <div class="corpus-browser">
            <div id="corpus-table" class="corpus-table"></div>
            <aside id="corpus-detail" class="corpus-detail">
              <div class="empty">选择一篇文献查看详情</div>
            </aside>
          </div>
        </section>

        <section id="view-system" class="view">
          <header class="topbar">
            <div>
              <h1>系统状态</h1>
              <p>本地服务与索引</p>
            </div>
          </header>
          <div id="system-panel" class="system-panel"></div>
        </section>
      </main>
    </div>
    <div id="pdf-modal" class="pdf-modal" hidden>
      <div class="pdf-viewer" role="dialog" aria-modal="true" aria-labelledby="pdf-title">
        <header class="pdf-viewer-header">
          <div>
            <strong id="pdf-title">证据页</strong>
            <span id="pdf-subtitle">PDF page preview</span>
          </div>
          <div class="pdf-actions">
            <button id="prev-pdf-page" class="ghost-button" type="button">上一页</button>
            <input id="pdf-page-input" class="page-input" type="number" min="1" value="1" aria-label="跳转页码" />
            <button id="next-pdf-page" class="ghost-button" type="button">下一页</button>
            <button id="zoom-out-pdf" class="ghost-button" type="button" title="缩小">缩小</button>
            <button id="zoom-in-pdf" class="ghost-button" type="button" title="放大">放大</button>
            <button id="fit-pdf" class="ghost-button" type="button">适应宽度</button>
            <a id="download-pdf" class="ghost-button" href="#" target="_blank" rel="noreferrer">下载 PDF</a>
            <button id="close-pdf" class="ghost-button" type="button">关闭</button>
          </div>
        </header>
        <div class="pdf-page-frame">
          <img id="pdf-page-img" alt="PDF 对应页预览" />
        </div>
      </div>
    </div>
    <script src="/assets/app.js?v=20260601-1605"></script>
  </body>
</html>
